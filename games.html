<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小游戏 - 黎明工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f9fafc;
            color: #1e2a3e;
            line-height: 1.6;
        }

        nav {
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 3rem;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .nav-container a {
            text-decoration: none;
            color: #2c3e50;
            transition: color 0.2s;
            padding: 0.5rem 0;
        }

        .nav-container a:hover {
            color: #e67e22;
        }

        .game-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
        }

        .game-header h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 0.3rem;
        }

        .game-header p {
            font-size: 1rem;
            color: #4a627a;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 2rem 0;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        .game-buttons {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
        }

        .game-buttons button {
            padding: 0.6rem 2rem;
            font-size: 1rem;
            background-color: #e67e22;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .game-buttons button:hover {
            background-color: #d35400;
        }

        .game-selector {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 0.5rem auto 1.5rem;
            padding: 0.5rem 0;
        }

        .game-selector .tab {
            padding: 0.5rem 1.5rem;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            background: none;
            color: #4a627a;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .game-selector .tab.active {
            color: #e67e22;
            border-bottom-color: #e67e22;
        }

        .game-selector .tab:hover {
            color: #e67e22;
        }

        .game-panel {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .game-panel.active {
            display: flex;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            border-top: 1px solid #e2e8f0;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <a href="index.html">首页</a>
        <a href="about.html">关于我们</a>
        <a href="join.html">加入我们</a>
        <a href="dawnwiki.html">黎明百科</a>
        <a href="games.html">小游戏</a>
    </div>
</nav>

<div class="game-header">
    <h1>小游戏</h1>
    <p id="gameDesc">点击空白格子放上障碍，别让小猫逃出边缘！</p>
</div>

<div class="game-selector">
    <button class="tab active" data-game="cat">围小猫</button>
    <button class="tab" data-game="dino">小恐龙</button>
</div>

<!-- 围小猫 -->
<div class="game-panel active" id="catPanel">
    <div class="game-area">
        <canvas id="catCanvas"></canvas>
        <div class="game-buttons">
            <button id="catRestartBtn">重新开始</button>
        </div>
    </div>
</div>

<!-- 小恐龙 -->
<div class="game-panel" id="dinoPanel">
    <div class="game-area">
        <canvas id="dinoCanvas"></canvas>
        <div class="game-buttons">
            <button id="dinoRestartBtn">重新开始</button>
        </div>
    </div>
</div>

<footer>黎明工作室</footer>

<script>
// ===== 游戏切换 =====
const tabs = document.querySelectorAll('.game-selector .tab');
const descMap = {
    cat: '点击空白格子放上障碍，别让小猫逃出边缘！',
    dino: '按空格键或点击屏幕跳跃，躲过障碍物！'
};
tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        const game = tab.dataset.game;
        document.getElementById(game + 'Panel').classList.add('active');
        document.getElementById('gameDesc').textContent = descMap[game];
        if (game === 'cat') catGame.draw();
        if (game === 'dino') dinoGame.draw();
    });
});
</script>

<script>
// ===== 围小猫游戏 =====
const catGame = {
    CELL: 35,
    SQRT3: Math.sqrt(3),
    RADIUS: 6,
    WALL_PROB: 0.10,
    board: {},
    catQ: 0, catR: 0,
    gameOver: false,
    canvas: null, ctx: null,

    init() {
        this.canvas = document.getElementById('catCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.gameOver = false;
        this.board = {};
        this.catQ = 0; this.catR = 0;
        for (let q = -this.RADIUS; q <= this.RADIUS; q++) {
            for (let r = -this.RADIUS; r <= this.RADIUS; r++) {
                if (!this.isInGrid(q, r)) continue;
                if (Math.abs(q) <= 2 && Math.abs(r) <= 2 && Math.abs(-q-r) <= 2) continue;
                if (Math.random() < this.WALL_PROB) this.board[this.k(q, r)] = 1;
            }
        }
        const cw = (2 * this.RADIUS + 1) * this.CELL * 1.5 + this.CELL;
        const ch = (2 * this.RADIUS + 1) * this.CELL * this.SQRT3 + this.CELL;
        this.canvas.width = cw;
        this.canvas.height = ch;
        this.draw();
    },

    k(q, r) { return q + ',' + r; },

    toPixel(q, r) {
        return {
            x: this.CELL * (1.5 * q) + this.canvas.width / 2,
            y: this.CELL * (this.SQRT3 / 2 * q + this.SQRT3 * r) + this.canvas.height / 2
        };
    },

    fromPixel(px, py) {
        const x = px - this.canvas.width / 2;
        const y = py - this.canvas.height / 2;
        const q = (2 / 3 * x) / this.CELL;
        const r = (-1 / 3 * x + this.SQRT3 / 3 * y) / this.CELL;
        return this.round(q, r);
    },

    round(q, r) {
        const s = -q - r;
        let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
        const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr - rs;
        else if (dr > ds) rr = -rq - rs;
        return { q: rq, r: rr };
    },

    drawHex(cx, cy, size) {
        this.ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const a = Math.PI / 180 * (60 * i);
            const x = cx + size * Math.cos(a);
            const y = cy + size * Math.sin(a);
            i === 0 ? this.ctx.moveTo(x, y) : this.ctx.lineTo(x, y);
        }
        this.ctx.closePath();
    },

    getN(q, r) { return [[q+1,r],[q-1,r],[q,r+1],[q,r-1],[q+1,r-1],[q-1,r+1]]; },

    isInGrid(q, r) {
        return Math.abs(q) <= this.RADIUS && Math.abs(r) <= this.RADIUS && Math.abs(-q-r) <= this.RADIUS;
    },

    hexDist(q, r) { return (Math.abs(q) + Math.abs(r) + Math.abs(-q-r)) / 2; },

    bfs(sq, sr) {
        const vis = new Set(); vis.add(this.k(sq, sr));
        const q = [{ q: sq, r: sr, d: 0 }];
        while (q.length > 0) {
            const c = q.shift();
            if (this.hexDist(c.q, c.r) === this.RADIUS) return c.d;
            for (const [nq, nr] of this.getN(c.q, c.r)) {
                const key = this.k(nq, nr);
                if (!vis.has(key) && this.isInGrid(nq, nr) && !this.board[key]) {
                    vis.add(key); q.push({ q: nq, r: nr, d: c.d + 1 });
                }
            }
        }
        return 999;
    },

    moveCat() {
        let bd = this.bfs(this.catQ, this.catR);
        if (bd === 999) { this.gameOver = true; this.draw(); return; }
        let bq = this.catQ, br = this.catR, bbd = bd;
        for (const [nq, nr] of this.getN(this.catQ, this.catR)) {
            if (!this.isInGrid(nq, nr) || this.board[this.k(nq, nr)]) continue;
            const d = this.bfs(nq, nr);
            if (d < bbd) { bbd = d; bq = nq; br = nr; }
        }
        if (bq !== this.catQ || br !== this.catR) { this.catQ = bq; this.catR = br; }
        else this.gameOver = true;
        this.draw();
    },

    draw() {
        const { ctx, canvas } = this;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let q = -this.RADIUS; q <= this.RADIUS; q++) {
            for (let r = -this.RADIUS; r <= this.RADIUS; r++) {
                if (!this.isInGrid(q, r)) continue;
                const { x, y } = this.toPixel(q, r);
                const isCat = (q === this.catQ && r === this.catR);
                const isWall = !!this.board[this.k(q, r)];
                this.drawHex(x, y, this.CELL * 0.9);
                ctx.fillStyle = isCat ? '#e67e22' : (isWall ? '#555' : '#dfe6ed');
                ctx.fill();
                ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke();
            }
        }
        if (this.gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const msg = this.bfs(this.catQ, this.catR) === 999 ? '你赢了！小猫被围住了！' : '小猫逃跑了！再试试？';
            ctx.fillText(msg, canvas.width / 2, canvas.height / 2);
        }
    },

    setup() {
        this.init();
        this.canvas.addEventListener('click', e => {
            if (this.gameOver) return;
            const rect = this.canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (this.canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (this.canvas.height / rect.height);
            const hex = this.fromPixel(mx, my);
            const key = this.k(hex.q, hex.r);
            if (!this.isInGrid(hex.q, hex.r)) return;
            if (this.board[key] || (hex.q === this.catQ && hex.r === this.catR)) return;
            this.board[key] = 1;
            this.draw();
            setTimeout(() => this.moveCat(), 150);
        });
        document.getElementById('catRestartBtn').addEventListener('click', () => this.init());
    }
};
</script>

<script>
// ===== 小恐龙游戏 =====
const dinoGame = {
    canvas: null, ctx: null,
    dino: { x: 50, y: 0, w: 30, h: 40, vy: 0, onGround: true },
    obstacles: [],
    clouds: [],
    groundY: 0,
    speed: 5,
    score: 0,
    highScore: parseInt(localStorage.getItem('dinoHigh') || '0'),
    gameOver: false,
    started: false,
    frame: 0,

    init() {
        this.canvas = document.getElementById('dinoCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = 800;
        this.canvas.height = 200;
        this.groundY = this.canvas.height - 30;
        this.dino.y = this.groundY - this.dino.h;
        this.dino.vy = 0;
        this.dino.onGround = true;
        this.obstacles = [];
        this.clouds = [];
        this.speed = 5;
        this.score = 0;
        this.gameOver = false;
        this.started = false;
        this.frame = 0;
        this.draw();
    },

    jump() {
        if (!this.started) { this.started = true; this.loop(); return; }
        if (this.gameOver) return;
        if (this.dino.onGround) {
            this.dino.vy = -12;
            this.dino.onGround = false;
        }
    },

    spawnObstacle() {
        const h = Math.random() < 0.5 ? 30 : 45;
        this.obstacles.push({
            x: this.canvas.width,
            y: this.groundY - h,
            w: 15 + Math.random() * 10,
            h: h
        });
    },

    spawnCloud() {
        this.clouds.push({
            x: this.canvas.width + Math.random() * 200,
            y: 20 + Math.random() * 50,
            w: 40 + Math.random() * 30
        });
    },

    update() {
        if (this.gameOver || !this.started) return;
        this.frame++;

        // Gravity
        this.dino.vy += 0.6;
        this.dino.y += this.dino.vy;
        if (this.dino.y >= this.groundY - this.dino.h) {
            this.dino.y = this.groundY - this.dino.h;
            this.dino.vy = 0;
            this.dino.onGround = true;
        }

        // Speed up
        this.speed = 5 + Math.floor(this.frame / 2000) * 0.3;

        // Score
        this.score = Math.floor(this.frame / 5);

        // Obstacles
        if (this.frame % Math.max(35, 60 - this.frame / 200) === 0) this.spawnObstacle();
        for (let o of this.obstacles) o.x -= this.speed;
        this.obstacles = this.obstacles.filter(o => o.x + o.w > 0);

        // Clouds
        if (this.frame % 150 === 0) this.spawnCloud();
        for (let c of this.clouds) c.x -= 1;
        this.clouds = this.clouds.filter(c => c.x + c.w > 0);

        // Collision
        for (let o of this.obstacles) {
            const dx = this.dino.x, dy = this.dino.y, dw = this.dino.w, dh = this.dino.h;
            if (dx < o.x + o.w && dx + dw > o.x + 4 && dy < o.y + o.h && dy + dh > o.y + 4) {
                this.gameOver = true;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('dinoHigh', String(this.score));
                }
                return;
            }
        }
    },

    drawDino() {
        const { ctx, dino: d } = this;
        ctx.fillStyle = '#535353';
        // Body
        ctx.fillRect(d.x + 5, d.y, 20, 20);
        // Head
        ctx.fillRect(d.x + 15, d.y - 10, 15, 15);
        // Eye
        ctx.fillStyle = '#fff';
        ctx.fillRect(d.x + 23, d.y - 7, 3, 3);
        ctx.fillStyle = '#535353';
        // Tail
        ctx.fillRect(d.x, d.y + 5, 8, 5);

        // Legs - 4 frame running animation
        if (!d.onGround) {
            // In air: legs tucked
            ctx.fillRect(d.x + 8, d.y + 20, 5, 10);
            ctx.fillRect(d.x + 18, d.y + 20, 5, 10);
        } else {
            const phase = Math.floor(this.frame / 5) % 4;
            if (phase === 0) {
                // Left leg forward, right back
                ctx.fillRect(d.x + 6, d.y + 20, 5, 15);
                ctx.fillRect(d.x + 20, d.y + 20, 5, 10);
            } else if (phase === 1) {
                // Both legs together (mid-step)
                ctx.fillRect(d.x + 10, d.y + 20, 5, 15);
                ctx.fillRect(d.x + 16, d.y + 20, 5, 15);
            } else if (phase === 2) {
                // Right leg forward, left back
                ctx.fillRect(d.x + 6, d.y + 20, 5, 10);
                ctx.fillRect(d.x + 20, d.y + 20, 5, 15);
            } else {
                // Both legs slightly apart (between steps)
                ctx.fillRect(d.x + 8, d.y + 20, 5, 13);
                ctx.fillRect(d.x + 17, d.y + 20, 5, 13);
            }
        }
    },

    drawObstacle(o) {
        const { ctx } = this;
        ctx.fillStyle = '#535353';
        // Cactus-like shape
        ctx.fillRect(o.x + o.w * 0.3, o.y, o.w * 0.4, o.h);
        // Arms
        if (o.h > 35) {
            ctx.fillRect(o.x, o.y + 10, o.w * 0.3, 5);
            ctx.fillRect(o.x, o.y + 5, 5, 10);
            ctx.fillRect(o.x + o.w * 0.7, o.y + 15, o.w * 0.3, 5);
            ctx.fillRect(o.x + o.w - 5, o.y + 10, 5, 10);
        }
    },

    draw() {
        const { ctx, canvas } = this;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground line
        ctx.fillStyle = '#535353';
        ctx.fillRect(0, this.groundY, canvas.width, 2);

        // Ground dots
        ctx.fillStyle = '#999';
        for (let i = 0; i < canvas.width; i += 25) {
            const offset = this.started ? (this.frame * this.speed) % 25 : 0;
            ctx.fillRect((i - offset + canvas.width) % canvas.width, this.groundY + 5 + (i % 3) * 4, 2, 2);
        }

        // Clouds
        ctx.fillStyle = '#e0e0e0';
        for (let c of this.clouds) {
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.w * 0.25, 0, Math.PI * 2);
            ctx.arc(c.x + c.w * 0.3, c.y - 5, c.w * 0.2, 0, Math.PI * 2);
            ctx.arc(c.x + c.w * 0.6, c.y, c.w * 0.25, 0, Math.PI * 2);
            ctx.fill();
        }

        // Obstacles
        for (let o of this.obstacles) this.drawObstacle(o);

        // Dino
        if (this.started || this.frame > 0) this.drawDino();
        else this.drawDino();

        // Score
        ctx.fillStyle = '#535353';
        ctx.font = '14px monospace';
        ctx.textAlign = 'right';
        ctx.fillText('HI ' + String(this.highScore).padStart(5, '0') + '  ' + String(this.score).padStart(5, '0'), canvas.width - 10, 25);

        // Game over
        if (this.gameOver) {
            ctx.fillStyle = '#535353';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = '14px sans-serif';
            ctx.fillText('按空格或点击重新开始', canvas.width / 2, canvas.height / 2 + 15);
        }

        // Not started hint
        if (!this.started) {
            ctx.fillStyle = '#535353';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('按空格键或点击开始', canvas.width / 2, 35);
        }
    },

    loop() {
        if (!this.started) return;
        this.update();
        this.draw();
        if (!this.gameOver) requestAnimationFrame(() => this.loop());
        else this.draw();
    },

    setup() {
        this.init();
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (this.gameOver) { this.init(); this.started = true; this.loop(); }
                else this.jump();
            }
        });
        this.canvas.addEventListener('click', () => {
            if (this.gameOver) { this.init(); this.started = true; this.loop(); }
            else this.jump();
        });
        document.getElementById('dinoRestartBtn').addEventListener('click', () => {
            this.init(); this.started = true; this.loop();
        });
    }
};
</script>

<script>
catGame.setup();
dinoGame.setup();
</script>
</body>
</html>
