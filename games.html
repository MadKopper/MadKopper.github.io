<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小游戏 - 黎明工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f9fafc;
            color: #1e2a3e;
            line-height: 1.6;
        }

        nav {
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 3rem;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .nav-container a {
            text-decoration: none;
            color: #2c3e50;
            transition: color 0.2s;
            padding: 0.5rem 0;
        }

        .nav-container a:hover {
            color: #e67e22;
        }

        .game-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
        }

        .game-header h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .game-header p {
            font-size: 1rem;
            color: #4a627a;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 2rem 3rem;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            background: #fff;
            cursor: pointer;
        }

        #restartBtn {
            margin-top: 1.5rem;
            padding: 0.7rem 2rem;
            font-size: 1rem;
            background-color: #e67e22;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #restartBtn:hover {
            background-color: #d35400;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <a href="index.html">首页</a>
        <a href="about.html">关于我们</a>
        <a href="join.html">加入我们</a>
        <a href="dawnwiki.html">黎明百科</a>
        <a href="games.html">小游戏</a>
    </div>
</nav>

<div class="game-header">
    <h1>围小猫</h1>
    <p>点击空白格子放上障碍，别让小猫逃出边缘！</p>
</div>

<div class="game-area">
    <canvas id="gameCanvas"></canvas>
    <button id="restartBtn">重新开始</button>
</div>

<footer>黎明工作室</footer>

<script>
    const CELL = 35;
    const SQRT3 = Math.sqrt(3);
    const RADIUS = 6;
    const WALL_PROB = 0.18;

    let board = {};
    let catQ, catR;
    let gameOver = false;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function hexKey(q, r) { return q + ',' + r; }

    function init() {
        gameOver = false;
        board = {};
        catQ = 0;
        catR = 0;

        for (let q = -RADIUS; q <= RADIUS; q++) {
            for (let r = -RADIUS; r <= RADIUS; r++) {
                const s = -q - r;
                if (Math.abs(s) <= RADIUS) {
                    if (Math.abs(q) <= 2 && Math.abs(r) <= 2 && Math.abs(s) <= 2) continue;
                    if (Math.random() < WALL_PROB) board[hexKey(q, r)] = 1;
                }
            }
        }

        const cw = (2 * RADIUS + 1) * CELL * 1.5 + CELL;
        const ch = (2 * RADIUS + 1) * CELL * SQRT3 + CELL;
        canvas.width = cw;
        canvas.height = ch;
        draw();
    }

    function hexToPixel(q, r) {
        return {
            x: CELL * (1.5 * q) + canvas.width / 2,
            y: CELL * (SQRT3 / 2 * q + SQRT3 * r) + canvas.height / 2
        };
    }

    function pixelToHex(px, py) {
        const x = px - canvas.width / 2;
        const y = py - canvas.height / 2;
        const q = (2 / 3 * x) / CELL;
        const r = (-1 / 3 * x + SQRT3 / 3 * y) / CELL;
        return hexRound(q, r);
    }

    function hexRound(q, r) {
        const s = -q - r;
        let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
        const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr - rs;
        else if (dr > ds) rr = -rq - rs;
        return { q: rq, r: rr };
    }

    function drawHex(cx, cy, size) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = Math.PI / 180 * (60 * i);
            const x = cx + size * Math.cos(angle);
            const y = cy + size * Math.sin(angle);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
    }

    function getNeighbors(q, r) {
        return [
            [q+1, r], [q-1, r], [q, r+1], [q, r-1], [q+1, r-1], [q-1, r+1]
        ];
    }

    function isInGrid(q, r) {
        return Math.abs(q) <= RADIUS && Math.abs(r) <= RADIUS && Math.abs(-q-r) <= RADIUS;
    }

    function hexDist(q, r) {
        return (Math.abs(q) + Math.abs(r) + Math.abs(-q-r)) / 2;
    }

    function bfs(startQ, startR) {
        const visited = new Set();
        visited.add(hexKey(startQ, startR));
        const queue = [{ q: startQ, r: startR, dist: 0 }];
        while (queue.length > 0) {
            const cur = queue.shift();
            if (hexDist(cur.q, cur.r) === RADIUS) {
                return cur.dist;
            }
            for (const [nq, nr] of getNeighbors(cur.q, cur.r)) {
                const key = hexKey(nq, nr);
                if (!visited.has(key) && isInGrid(nq, nr) && !board[key]) {
                    visited.add(key);
                    queue.push({ q: nq, r: nr, dist: cur.dist + 1 });
                }
            }
        }
        return 999;
    }

    function moveCat() {
        let bestDist = bfs(catQ, catR);
        if (bestDist === 999) {
            gameOver = true;
            draw();
            return;
        }
        let bestQ = catQ, bestR = catR, bestD = bestDist;
        for (const [nq, nr] of getNeighbors(catQ, catR)) {
            if (!isInGrid(nq, nr)) continue;
            const key = hexKey(nq, nr);
            if (board[key]) continue;
            const d = bfs(nq, nr);
            if (d < bestD) {
                bestD = d; bestQ = nq; bestR = nr;
            }
        }
        if (bestQ !== catQ || bestR !== catR) {
            catQ = bestQ; catR = bestR;
        } else {
            gameOver = true;
        }
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let q = -RADIUS; q <= RADIUS; q++) {
            for (let r = -RADIUS; r <= RADIUS; r++) {
                if (!isInGrid(q, r)) continue;
                const { x, y } = hexToPixel(q, r);
                const key = hexKey(q, r);
                const isCat = (q === catQ && r === catR);
                const isWall = !!board[key];
                drawHex(x, y, CELL * 0.9);
                ctx.fillStyle = isCat ? '#e67e22' : (isWall ? '#555' : '#dfe6ed');
                ctx.fill();
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const msg = bfs(catQ, catR) === 999
                ? '你赢了！小猫被围住了！'
                : '小猫逃跑了！再试试？';
            ctx.fillText(msg, canvas.width / 2, canvas.height / 2);
        }
    }

    canvas.addEventListener('click', e => {
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        const hex = pixelToHex(mx, my);
        const key = hexKey(hex.q, hex.r);
        if (!isInGrid(hex.q, hex.r)) return;
        if (board[key] || (hex.q === catQ && hex.r === catR)) return;
        board[key] = 1;
        draw();
        setTimeout(moveCat, 150);
    });

    document.getElementById('restartBtn').addEventListener('click', init);
    init();
</script>
</body>
</html>
